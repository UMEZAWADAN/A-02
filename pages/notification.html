<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">
    <title>通知管理</title>

    <link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div id="sidebar"></div>

<div class="main">

<div class="page-header">

    <h1>通知管理</h1>

    <div class="header-buttons">

        <button id="refreshBtn">
            🔄 更新
        </button>

        <button id="settingBtn">
            ⚙ 通知設定
        </button>

    </div>

</div>

<div class="cards">

    <div class="card">

        <h3>本日の通知件数</h3>

        <p class="number">18</p>

    </div>

    <div class="card">

        <h3>利用催促</h3>

        <p class="number">7</p>

    </div>

    <div class="card">

        <h3>終了前通知</h3>

        <p class="number">8</p>

    </div>

    <div class="card">

        <h3>警告通知</h3>

        <p class="number">3</p>

    </div>

</div>

<div class="table-box">

<div class="table-header">

    <h2>通知履歴</h2>

    <div class="search-box">

        <input
            type="text"
            id="searchInput"
            placeholder="利用者ID・通知種別で検索">

    </div>

    <select id="sortSelect">

        <option value="new">新しい順</option>
        <option value="old">古い順</option>

</select>

</div>

<table id="notificationTable">

<tr>

<th>送信時刻</th>
<th>通知種別</th>
<th>利用者ID</th>
<th>状態</th>
<th>詳細</th>

</tr>

<tr>

<td>13:20</td>
<td>利用催促</td>
<td>A001</td>
<td>送信済</td>

<td>

<button
class="detail-btn"

data-user="A001"
data-type="利用催促通知"
data-time="2026/07/20 13:20"
data-status="送信済"
data-message="予約時間が開始しています。利用を開始してください。">

詳細

</button>

</td>

</tr>

<tr>

<td>15:15</td>
<td>終了前通知</td>
<td>B004</td>
<td>送信済</td>

<td>

<button
class="detail-btn"

data-user="B004"
data-type="終了前通知"
data-time="2026/07/20 15:15"
data-status="送信済"
data-message="まもなく利用終了です。ご準備をお願いします。">

詳細

</button>

</td>

</tr>

<tr>

<td>18:30</td>
<td>警告通知</td>
<td>C011</td>
<td>送信済</td>

<td>

<button
class="detail-btn"

data-user="C011"
data-type="警告通知"
data-time="2026/07/20 18:30"
data-status="送信済"
data-message="利用ルール違反を検知しました。ご確認ください。">

詳細

</button>

</td>

</tr>

</table>

<div class="pagination">

    <button id="prevPage">← 前へ</button>

    <span id="pageNumber">1</span>

    <button id="nextPage">次へ →</button>

</div>

</div>

</button>

</div>
</div>

</div>


<div class="setting-modal" id="settingModal">

<div class="setting-box">


<h2>通知設定</h2>

<hr>

<h3>通知条件</h3>

<label>

<input type="checkbox" checked>

利用催促通知

</label>

<div class="setting-row">

予約開始から

<input type="number" value="5">

分後

</div>

<label>

<input type="checkbox" checked>

終了前通知

</label>

<div class="setting-row">

終了

<input type="number" value="5">

分前

</div>

<label>

<input type="checkbox" checked>

警告通知

</label>

<p>

違反検知時に即時送信

</p>

<hr>

<h3>通知テンプレート</h3>

<label>利用催促通知</label>

<textarea rows="3">

予約時間が開始しています。利用を開始してください。

</textarea>

<label>終了前通知</label>

<textarea rows="3">

まもなく利用終了です。ご準備をお願いします。

</textarea>

<label>警告通知</label>

<textarea rows="3">

利用ルール違反を検知しました。ご確認ください。

</textarea>

<div class="modal-buttons">

<button>

設定を保存

</button>

<button id="closeBtn">

閉じる

</button>

</div>

</div>

</div>

<div class="setting-modal" id="detailModal">

    <div class="setting-box">

        <h2>通知詳細</h2>

        <p><strong>利用者ID：</strong><span id="detailUser"></span></p>

        <p><strong>通知種別：</strong><span id="detailType"></span></p>

        <p><strong>送信日時：</strong><span id="detailTime"></span></p>

        <p><strong>送信結果：</strong><span id="detailStatus"></span></p>

        <textarea id="detailMessage" rows="4" readonly></textarea>

        <label>通知内容</label>

        <textarea rows="4" readonly>
予約時間が開始しています。
利用を開始してください。
        </textarea>

        <div class="modal-buttons">

            <button id="closeDetailBtn">

                閉じる

            </button>

        </div>

    </div>

</div>

<script src="../js/common.js"></script>
<script src="../js/script.js"></script>

</body>

</html>
