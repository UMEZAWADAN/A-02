<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">
    <title>通知管理</title>

    <link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div id="sidebar"></div>

<div class="main">

<div class="page-header">

    <h1>通知管理</h1>

    <div class="header-buttons">

        <button id="refreshBtn">
            🔄 更新
        </button>

        <button id="settingBtn">
            ⚙ 通知設定
        </button>

    </div>

</div>

<div class="cards">

    <div class="card">

        <h3>本日の通知件数</h3>

        <p class="number">18</p>

    </div>

    <div class="card">

        <h3>利用催促</h3>

        <p class="number">7</p>

    </div>

    <div class="card">

        <h3>終了前通知</h3>

        <p class="number">8</p>

    </div>

    <div class="card">

        <h3>警告通知</h3>

        <p class="number">3</p>

    </div>

</div>

<div class="table-box">

<h2>通知履歴</h2>

<table>

<tr>

<th>送信時刻</th>
<th>通知種別</th>
<th>送信先</th>
<th>状態</th>

</tr>

<tr>

<td>13:20</td>
<td>利用催促</td>
<td>A001</td>
<td>送信済</td>

</tr>

<tr>

<td>15:15</td>
<td>終了前通知</td>
<td>B004</td>
<td>送信済</td>

</tr>

<tr>

<td>18:30</td>
<td>警告通知</td>
<td>C011</td>
<td>送信済</td>

</tr>

</table>

</div>

<div class="detail">

</button>

</div>
</div>

</div>


<div class="setting-modal" id="settingModal">

<div class="setting-box">


<h2>通知設定</h2>

<hr>

<h3>通知条件</h3>

<label>

<input type="checkbox" checked>

利用催促通知

</label>

<div class="setting-row">

予約開始から

<input type="number" value="5">

分後

</div>

<label>

<input type="checkbox" checked>

終了前通知

</label>

<div class="setting-row">

終了

<input type="number" value="5">

分前

</div>

<label>

<input type="checkbox" checked>

警告通知

</label>

<p>

違反検知時に即時送信

</p>

<hr>

<h3>通知テンプレート</h3>

<label>利用催促通知</label>

<textarea rows="3">

予約時間が開始しています。利用を開始してください。

</textarea>

<label>終了前通知</label>

<textarea rows="3">

まもなく利用終了です。ご準備をお願いします。

</textarea>

<label>警告通知</label>

<textarea rows="3">

利用ルール違反を検知しました。ご確認ください。

</textarea>

<div class="modal-buttons">

<button>

設定を保存

</button>

<button id="closeBtn">

閉じる

</button>

</div>

</div>

</div>

<script src="../js/common.js"></script>
<script src="../js/script.js"></script>

</body>

</html>
