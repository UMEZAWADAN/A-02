<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">
    <title>監視結果</title>

    <link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div id="sidebar"></div>

<div class="main">

<header>

<h1>監視結果</h1>

</header>

<div class="camera-area">

<div class="camera">

<h3>映像</h3>

<img src="../images/camera.png">

</div>

<div class="status">

<h3>検知結果</h3>

<table>

<tr>

<th>項目</th>

<th>結果</th>

</tr>

<tr>

<td>共連れ</td>

</tr>

<tr>

<td>長時間占有</td>

<td>なし</td>

</tr>

<tr>

<td>空予約</td>

<td>なし</td>

</tr>

<tr>

<td>利用人数</td>

<td>2人</td>

</tr>

<tr>

<td>対象設備</td>

<td>セルフエステ</td>

</tr>

</table>

</div>

</div>

<div class="table-box">

<h2>検知履歴</h2>

<table>

<tr>

<th>時刻</th>

<th>設備</th>

<th>違反</th>

<th>画像</th>

</tr>

<tr>

<td>13:25</td>

<td>セルフエステ</td>

<td>共連れ</td>

<td>

<button>表示</button>

</td>

</tr>

<tr>

<td>15:42</td>

<td>ゴルフ</td>

<td>長時間占有</td>

<td>

<button>表示</button>

</td>

</tr>

</table>

</div>

</div>

<script src="../js/common.js"></script>

</body>

</html>
